{% extends "base.html" %}

{% block title %}Livelist - {{ band.name }}{% endblock %}

{% block extra_head %}
<script type="text/javascript" src="{{ url_for('static', filename='js/socket.io.min.js') }}"></script>
<script type="text/javascript" src="{{ url_for('static', filename='js/app.js') }}"></script>
<script type="text/javascript" src="{{ url_for('static', filename='js/dnd.js') }}"></script>
<script>
    var state = {};
</script>

{% endblock %}

{% block content %}
<e-json
        data-src="{{ url_for('api.get_playlist_items', playlist_id=playlist.id) if playlist else '' }}"
        data-src="FAKEURL{{ url_for('api.get_playlist_items', playlist_id=playlist.id) if playlist else '' }}"
        data-cache-from="${ {body: {items:[]} } }"
        data-response-name="res"
        data-actions-on-response="mapToTemplate('#playlistItems', res.body); mapToTemplate('#playlistHeaderTemplate', res.body)"
        >

        <!-- Navigation -->
        <nav class="navbar bg-body-tertiary navbar-expand-lg sticky-top">
            <div class="container-fluid">
                <template id="playlistHeaderTemplate" is="e-reusable" data-object-name="playlist">
                    <div id="playlistHeader">
                        <span class="navbar-brand text-muted" data-text="${playlist.name}">
                            <small class="text-muted ms-2" id="playlist-date" data-text="${playlist.date}"></small>
                        </span>
                    </div>
                </template>
            </div>
            <div class="container-fluid mt-2">
                <button class="btn btn-outline-primary bi bi-plus mx-lg-2" data-bs-toggle="offcanvas"
                        data-bs-target="#songlist-panel">Add Song</button>
                <button class="btn btn-outline-primary bi bi-list-ul mx-lg-2" data-bs-toggle="offcanvas"
                        data-bs-target="#playlist-panel">Playlists</button>
                <a class="btn btn-outline-primary bi bi-file-play mx-lg-2" href="{{ url_for('views.play_view', playlist_id=playlist.id) if playlist else '#' }}"
                target="_blank">Live</a>
                <button class="btn btn-outline-primary bi bi-pencil-fill mx-lg-2" id="toggle-edit">Edit</button>
                <button class="btn bi bi-sort-numeric-down" id="edit-sort"></button>
            </div>
            <!-- Selection events: sort, cut (and move to another position / playlist) -->
        </nav>

    <div class="container-fluid">
        <!-- Current Playlist Header -->
        <div class="card mb-3">
            <div class="card-header d-flex justify-content-between align-items-center">
                <div class="mb-0">
                    <span id="playlist-name">Set 1</span>
                </div>
                <div>
                    <button class="btn btn-sm btn-outline-primary bi bi-copy clipboard-copy-playlist"></button>
                </div>
            </div>

            <!-- Playlist Items -->
            <div class="card-body p-0" id="playlist">
                <template id="playlistItems" is="e-reusable" data-object-name="playlist">
                    <ul class="list-group list-group-flush" id="playlist-items">
                        <template is="e-for-each"
                                 data-list-to-iterate="${playlist.items}"
                                 data-item-name="item">
                            <li class="playlist-item list-group-item d-flex align-items-center gap-2 ${pliClassSelected(item)}"
                                data-item-id="${item.id}"
                                data-song-id="${item.song_id}">
                                <span class="drag-handle bi bi-grip-vertical text-muted" draggable="true"></span>
                                <span class="item-position btn btn-primary rounded-pill " data-text="${item.position + 1}"></span>
                                <span class="item-selectbox btn btn-success xrounded-pill bi bi-square d-none"></span>
                                <div class="flex-grow-1">
                                    <div class="song-name" data-text="${item.song.name}"></div>
                                    <small class="text-muted" data-text="${item.song.user_id ? item.song.user_id + ' - ' : ''}${item.song.notes || ''}"></small>
                                </div>
                                <div class="btn-group btn-group-sm">
                                    <button class="playlist-item-play btn bi bi-play-fill ${pliClassActive(item)}"
                                            data-item-id="${item.id}"
                                            title="Play"></button>
                                    <button class="btn btn-warning bi bi-pencil edit-item-button d-none"
                                            data-item-id="${item.id}"
                                            title="Edit"></button>
                                    <button class="btn btn-danger bi bi-trash delete-item-button d-none"
                                            data-item-id="${item.id}"
                                            title="Delete"></button>
                                </div>
                            </li>
                        </template>
                    </ul>
                </template>
            </div>
        </div>
    </div>
</e-json>

<!-- Songlist Panel (Offcanvas) -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="songlist-panel">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">Song Library</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        <button type="button" class="btn bi bi-pin"></button>
    </div>
    <div class="offcanvas-body">
        <!-- Filter controls -->
        <div class="mb-3">
            <div class="input-group mb-2">
                <input type="text" class="form-control" id="song-filter" placeholder="Type or use keypad...">
                <button class="btn btn-outline-secondary bi bi-keyboard" type="button" id="toggle-keypad"></button>
            </div>
            <div class="keypad-container mb-2 d-none" id="keypad-container">
                <div class="d-flex flex-wrap gap-1 justify-content-center">
                    <button class="btn btn-outline-primary keypad-btn" data-key="1">1 *</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="2">2 ABC</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="3">3 DEF</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="4">4 GHI</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="5">5 JKL</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="6">6 MNO</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="7">7 PQRS</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="8">8 TUV</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="9">9 WXYZ</button>
                    <button class="btn btn-outline-danger keypad-btn" data-key="backspace">⌫</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="0">0 SPACE</button>
                    <button class="btn btn-outline-warning keypad-btn" data-key="clear">C</button>
                </div>
            </div>
            <div class="d-flex gap-2 mb-2">
                <button class="btn btn-sm btn-outline-primary bi bi-sort-alpha-down" id="sort-alpha">A-Z</button>
                <button class="btn btn-sm btn-outline-primary bi bi-sort-numeric-down" id="sort-bpm">BPM</button>
                <button class="btn btn-sm btn-outline-primary bi bi-sort-down" id="sort-id">ID</button>
                <div class="flex-grow-1">
                    <select class="form-select form-select-sm" id="tag-filter">
                        <option value="">All Tags</option>
                        <!-- Tags will be populated by JavaScript -->
                    </select>
                </div>
            </div>
            <div>
                <input type="radio" class="btn-check " name="song-insert" id="song-insert-before" autocomplete="off" data-bs-title="AAA">
                <label class="btn btn-sm btn-outline-primary bi bi-arrow-bar-up" for="song-insert-before">Before</label>
                <input type="radio" class="btn-check " name="song-insert" id="song-insert-after" autocomplete="off">
                <label class="btn btn-sm btn-outline-primary bi bi-arrow-bar-down" for="song-insert-after">After</label>
                <input type="radio" class="btn-check " name="song-insert" id="song-insert-end" autocomplete="off" checked data-bs-title="XXX">
                <label class="btn btn-sm btn-outline-primary bi bi-chevron-bar-down" for="song-insert-end">At end</label>
            </div>
        </div>

        <!-- Song list -->
        <div id="song-list-container">
            <e-json data-src="{{ url_for('api.get_songs', band_id=band.id) }}"
                data-response-name="res"
                data-actions-on-response="mapToTemplate('#songlistItems', res.body)"
                >
                <template id="songlistItems" data-object-name="songs">
                    <div class="list-group" id="song-list">
                        <template is="e-for-each"
                                    data-list-to-iterate="${songs}"
                                    data-item-name="song">
                            <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center song-item ${siClassUsed(song)}"
                                    data-song-id="${song.id}"
                                    data-song-name="${song.name}"
                                    data-song-bpm="${song.bpm}"
                                    >
                                <div>
                                    <div class="fw-bold" data-text="${song.name}"></div>
                                    <small class="text-muted" data-text="
                                        ${song.user_id ? song.user_id + ' · ' : ''}
                                        ${song.bpm ? 'BPM: ' + song.bpm + ' · ' : ''}
                                        ${song.tags ? song.tags.join(', ') : ''}
                                        ">
                                    </small>
                                </div>
                                <span class="badge bg-primary rounded-pill">+</span>
                            </button>
                        </template>
                    </div>
                </template>
            </e-json>
        </div>
    </div>
</div>

<!-- Playlist Panel (Offcanvas) -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="playlist-panel">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">Playlists</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <!-- Create new playlist form -->
        <div class="mb-3">
            <div class="input-group">
                <input type="text" class="form-control" id="new-playlist-name" placeholder="Playlist name">
                <input type="date" class="form-control" id="new-playlist-date" value="{{ date_today }}">
                <button class="btn btn-primary bi bi-plus-circle" id="create-playlist-btn">Create</button>
            </div>
        </div>

        <e-json
                data-src="XXX{{ url_for('api.get_band_playlists', band_id=band.id)}}"
                data-response-name="res"
                data-cache-from="${ {body: [] } }"
                data-actions-on-response="mapToTemplate('#playlists', res.body)">
            <!-- Playlist list -->
            <template id="playlists" is="e-reusable" data-object-name="playlists">
                <ul class="list-group" id="playlist-list">
                    <template is="e-for-each"
                             data-list-to-iterate="${playlists}"
                             data-item-name="pl">
                        <li class="list-group-item list-group-item-action xbtn-group xbtn-group-sm playlist-select-item playlist-select-btn ${plClassSelected(pl)}" data-playlist-id="${pl.id}">
                            <div class="xlist-group-item xlist-group-item-action d-flex justify-content-between align-items-center "
                                    data-playlist-id="${pl.id}"
                                    :class="">
                                <div>
                                    <div class="list-playlist-name fw-bold" data-text="${pl.name}"></div>
                                    <small class="list-playlist-date text-muted" data-text="${pl.date}"></small>
                                    <small class="text-muted"> · </small>
                                    <small class="list-playlist-song_count text-muted" data-text="${pl.item_count}"></small>
                                    <small class="text-muted"> songs</small>
                                </div>

                                <div>
                                <button class="btn bi bi-broadcast activate-playlist-btn ${plClassActive(pl)}"
                                        data-playlist-id="${pl.id}" data-Xbs-dismiss="offcanvas"></button>
                                <button class="btn btn-outline-primary bi bi-pencil edit-playlist-btn"
                                        data-playlist-id="${pl.id}" data-bs-toggle="modal" data-bs-target="#edit-playlist-modal"></button>
                                <button class="btn btn-outline-danger bi bi-trash delete-playlist-btn dd-none"
                                        data-playlist-id="${pl.id}"></button>
                                </div>
                            </div>
                        </li>
                    </template>
                </ul>
            </template>
        </e-json>
    </div>
</div>

<!-- Edit Playlist Modal -->
<div class="modal fade" id="edit-playlist-modal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Playlist</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="edit-playlist-form">
                    <div class="mb-3">
                        <label for="edit-playlist-name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="edit-playlist-name" required>
                    </div>
                    <div class="mb-3">
                        <label for="edit-playlist-date" class="form-label">Date</label>
                        <input type="date" class="form-control" id="edit-playlist-date" required>
                    </div>
                    <input type="hidden" id="edit-playlist-id">
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="save-playlist-changes">Save Changes</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ jinja_script | safe}}
<script>
    state = {
        io: io,
        editMode: false,
        selectedItems: new Set(),
        socket: null,

        selectionMode: "none",
        selection: new Array(),

        currentBand: null,
        currentPlaylist: null,
        currentItem: null,
        activeItem: null,
        activePlaylist: null,

        playlist: null,
        usedSongs: [],
    };

    jinja_update(state);
    initApplication(state);
</script>
{% endblock %}
