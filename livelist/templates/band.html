{% extends "base.html" %}

{% block title %}Livelist - {{ band.name }}{% endblock %}

{% block extra_head %}
<script type="text/javascript" src="{{ url_for('static', filename='js/socket.io.min.js') }}"></script>
<script type="text/javascript" src="{{ url_for('static', filename='js/app.js') }}"></script>
<script type="text/javascript" src="{{ url_for('static', filename='js/dnd.js') }}"></script>
{% endblock %}

{% block content %}

<template id="playlist-item-template">
    <li class="playlist-item list-group-item list-group-item-action xbtn-group xbtn-group-sm playlist-select-item playlist-btn-select">
        <div class="xlist-group-item xlist-group-item-action d-flex justify-content-between align-items-center">
            <div>
                <div class="playlist-item-name fw-bold"></div>
                <small class="playlist-item-date text-muted"></small>
                <small class="text-muted"> · </small>
                <small class="playlist-item-songcount text-muted"></small>
                <small class="text-muted"> songs</small>
            </div>

            <div>
                <button class="btn bi bi-broadcast activate-playlist-btn playlist-btn-activate" data-Xbs-dismiss="offcanvas"></button>
                <button class="btn btn-outline-primary bi bi-pencil playlist-btn-edit" data-bs-toggle="modal" data-bs-target="#edit-playlist-modal"></button>
                <button class="btn btn-outline-danger bi bi-trash playlist-btn-delete dd-none"></button>
            </div>
        </div>
    </li>
</template>

<template id="livelist-item-template">
    <li class="drag-handle livelist-item list-group-item list-group-item-action d-flex align-items-center gap-2" draggable="true">
        <span class="bi bi-grip-vertical text-muted d-none"></span>
        <div class="livelist-item-positions" role="group">
            <span class="livelist-item-position btn btn-primary"></span>
            <span class="livelist-item-selectbox btn btn-outline-warning d-none"></span>
        </div>
        <div class="flex-grow-1">
            <div class="song-name"></div>
            <small class="song-user_id text-muted"></small>
            <small class="song-tags text-muted"></small>
        </div>
            <button class="btn livelist-item-anchor d-none">&#x2693;</button>
        <div class="btn-group xbtn-group-sm livelist-item-btn-group-right">
            <button class="btn btn-danger bi bi-trash livelist-item-delete d-none" title="Delete"></button>
            <button class="btn bi bi-play-fill livelist-item-play" title="Play"></button>
        </div>
    </li>
</template>


<template id="songlist-tag-template">
    <small class="songlist-item-tag badge text-bg-info text-muted gap-1"></small>
</template>


<template id="songlist-item-template">
    <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center songlist-item">
        <div>
            <div class="songlist-item-name fw-bold"></div>
            <small class="songlist-item-meta text-muted"></small>

            <div class="songlist-item-tags">
            </div>
        </div>
        <span class="btn btn-sm btn-outline-primary bi bi-plus-circle-fill text-primary songlist-mode-add"></span>
        <span class="btn btn-sm btn-outline-warning bi bi-pencil-fill text-warning songlist-mode-edit d-none" data-bs-toggle="modal" data-bs-target="#edit-song-modal"></span>
    </button>
</template>

<!-- Navigation -->
<nav class="navbar bg-body-tertiary navbar-expand-lg sticky-top">
    <div class="container-fluid">
        <div id="playlistHeader">
            <span class="navbar-brand text-muted" id="livelist-name"></span>
            <small class="text-muted ms-2" id="livelist-date"></small>
        </div>
    </div>
    <div class="container-fluid mt-2">
        <div id="nav-main">
            <button class="btn btn-outline-primary bi bi-plus mx-lg-2" data-bs-toggle="offcanvas"
                    data-bs-target="#songlist-panel">Add Song</button>
            <button class="btn btn-outline-primary bi bi-list-ul mx-lg-2" data-bs-toggle="offcanvas"
                    data-bs-target="#playlist-panel">Playlists</button>
            <a class="btn btn-outline-primary bi bi-file-play mx-lg-2" href="{{ url_for('views.play_view', playlist_id=playlist.id) if playlist else '#' }}"
            target="_blank">Live</a>
        </div>
        <div id="nav-edit" class="d-none">
            <button class="btn btn-danger bi bi-trash  xd-none" id="livelist-delete-selected" title="Delete selected">Delete selected</button>
            <button class="btn btn-outline-primary bi bi-sort-numeric-down" id="edit-sort" title="Update order">Update order</button>
        </div>
        <button class="btn btn-outline-primary bi bi-pencil-fill mx-lg-2" id="toggle-edit">Edit</button>
    </div>
    <!-- Selection events: sort, cut (and move to another position / playlist) -->
</nav>

<div class="container-fluid">
    <!-- Current Playlist Header -->
    <div class="card mb-3 mt-3">
        <div class="card-header list-group-item-action d-flex justify-content-between align-items-center" id="livelist-header">
            <div class="mb-0">
                <span id="playlist-set-name">Set 1</span>
            </div>
            <div class="btn-group">
                <button class="btn livelist-item-anchor" id="livelist-header-anchor">&#x2693;</button>
                <button class="btn xbtn-sm btn-outline-primary bi bi-copy clipboard-copy-set"></button>
                <button class="btn d-none"></button>
            </div>
        </div>

        <!-- Livelist -->
        <div class="card-body p-0" id="livelist">
            <ul class="list-group list-group-flush" id="livelist-items">
            </ul>
        </div>

    </div>
</div>

<!-- Songlist Panel (Offcanvas) -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="songlist-panel">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">Song Library</h5>
        <button type="button" class="btn btn-outline-primary bi bi-pencil-fill float-end" id="songlist-panel-edit"></button>
        <button type="button" class="btn btn-pin bi bi-pin-fill float-end" id="songlist-panel-pin"></button>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <!-- Filter controls -->
        <div class="mb-3">
            <div class="input-group mb-2">
                <input type="text padding-right" class="form-control" id="song-filter" placeholder="Type or use keypad...">
                <button class="btn btn-outline-warning bi bi-plus songlist-mode-edit d-none" type="button" id="songlist-song-create"></button>
                <button class="btn btn-outline-secondary bi bi-keyboard songlist-mode-add" type="button" id="toggle-keypad"></button>
            </div>
            <div class="keypad-container mb-2 d-none" id="keypad-container">
                <div class="d-flex flex-wrap gap-1 justify-content-center">
                    <button class="btn btn-outline-primary keypad-btn" data-key="1">1 *</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="2">2 ABC</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="3">3 DEF</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="4">4 GHI</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="5">5 JKL</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="6">6 MNO</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="7">7 PQRS</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="8">8 TUV</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="9">9 WXYZ</button>
                    <button class="btn btn-outline-danger keypad-btn" data-key="backspace">⌫</button>
                    <button class="btn btn-outline-primary keypad-btn" data-key="0">0 SPACE</button>
                    <button class="btn btn-outline-warning keypad-btn" data-key="clear">C</button>
                </div>
            </div>
            <div class="d-flex gap-2 mb-2">
                <button class="btn btn-sm btn-outline-primary bi bi-sort-alpha-down" id="sort-alpha">A-Z</button>
                <button class="btn btn-sm btn-outline-primary bi bi-sort-numeric-down" id="sort-bpm">BPM</button>
                <button class="btn btn-sm btn-outline-primary bi bi-sort-down" id="sort-id">ID</button>
                <button class="btn btn-sm btn-outline-primary bi bi-tags" id="tag-filter-btn">Tags</button>
                <div class="flex-grow-1 d-none">
                    <select class="form-select form-select-sm" id="xtag-filter">
                        <option value="">All Tags</option>
                        <!-- Tags will be populated by JavaScript -->
                    </select>
                </div>

            </div>

            <template id="tagfilter-template">
                <button class="badge btn btn-sm btn-outline-primary mx-1 tag-filter-item"></button>
            </template>
            <div class="d-none" id="tag-filter">
                <div class="w-100 gap-2" id="tag-filter-list"></div>
                <!--
                <hr/>
                <div class="w-100 gap-2" id="tag-filter-active"></div>
                -->
            </div>

            <div class="d-none">
                <input type="radio" class="btn-check " name="song-insert" id="song-insert-before" autocomplete="off" data-bs-title="AAA">
                <label class="btn btn-sm btn-outline-primary bi bi-arrow-bar-up" for="song-insert-before">Before</label>
                <input type="radio" class="btn-check " name="song-insert" id="song-insert-after" autocomplete="off">
                <label class="btn btn-sm btn-outline-primary bi bi-arrow-bar-down" for="song-insert-after">After</label>
                <input type="radio" class="btn-check " name="song-insert" id="song-insert-end" autocomplete="off" checked data-bs-title="XXX">
                <label class="btn btn-sm btn-outline-primary bi bi-chevron-bar-down" for="song-insert-end">At end</label>
            </div>
        </div>

        <!-- Song list -->
        <div id="song-list-container">
            <div class="list-group" id="song-list">
            </div>

        </div>
    </div>
</div>

<!-- Playlist Panel (Offcanvas) -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="playlist-panel">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">Playlists</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <!-- Create new playlist form -->
        <div class="mb-3">
            <div class="input-group">
                <input type="text" class="form-control" id="new-playlist-name" placeholder="Playlist name">
                <input type="date" class="form-control" id="new-playlist-date" value="{{ date_today }}">
                <button class="btn btn-primary bi bi-plus-circle" id="create-playlist-btn">Create</button>
            </div>
        </div>

        <ul class="list-group" id="playlist-items">
        </ul>
    </div>
</div>

<!-- Edit Playlist Modal -->
<div class="modal fade" id="edit-playlist-modal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Playlist</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="edit-playlist-form">
                    <div class="mb-3">
                        <label for="edit-playlist-name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="edit-playlist-name" required>
                    </div>
                    <div class="mb-3">
                        <label for="edit-playlist-date" class="form-label">Date</label>
                        <input type="date" class="form-control" id="edit-playlist-date" required>
                    </div>
                    <input type="hidden" id="edit-playlist-id">
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="save-playlist-changes">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Song Modal -->
<div class="modal fade" id="edit-song-modal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Song</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="edit-song-form">
                    <div class="mb-3">
                        <label for="edit-song-name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="edit-song-name" required>
                    </div>
                    <div class="mb-3">
                        <label for="edit-song-bpm" class="form-label">BPM</label>
                        <input type="text" class="form-control" id="edit-song-bpm" required>
                    </div>

                    <label for="edit-song-tag" class="form-label">Tags</label>
                    <div id="edit-song-tags" class="gap-1 pb-2"></div>
                    <div class="mb-3 input-group">
                        <input type="text" class="form-control" id="edit-song-tag" required>
                        <button type="button" class="btn btn-primary bi bi-plus" id="edit-song-tag-create"></button>
                    </div>
                    <input type="hidden" id="edit-song-id">
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="save-song-changes">Save Changes</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
{{ jinja_script | safe }}
<script>
    var state = {
        io: io,
        editMode: false,
        selectedItems: new Set(),
        socket: null,

        selectionMode: "none",
        selection: new Array(),

        currentBand: null,
        currentPlaylist: null,
        currentItem: null,
        activeItem: null,
        activePlaylist: null,

        playlist: null,
        songlist: [],
        usedSongs: [],
        socket_auth: {
            auth: {
                band: null,
                key: null,
            },
        },
    };

    jinja_update(state);
    initApplication();
</script>
{% endblock %}
